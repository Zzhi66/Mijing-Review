<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="觅境点评 —— AI 智能客服" />
  <title>AI 客服 · 觅境点评</title>
  <link rel="stylesheet" href="./css/common.css" />
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #f0f2f7;
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }

    /* ── 顶部导航 ── */
    .nav-bar {
      flex-shrink: 0;
      height: 60px; padding: 0 16px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--color-border-light);
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 8px rgba(0,0,0,.06);
    }
    .nav-back {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--color-bg); border: none; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      transition: background .2s; flex-shrink: 0;
    }
    .nav-back:hover { background: var(--color-border); }
    .nav-info { flex: 1; min-width: 0; }
    .nav-title { font-size: 16px; font-weight: 700; color: var(--color-text-primary); }
    .nav-status {
      font-size: 12px; color: var(--color-success);
      display: flex; align-items: center; gap: 4px;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--color-success); animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(1.3); }
    }
    .nav-avatar {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--gradient-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      box-shadow: var(--shadow-primary);
    }

    /* ── 消息列表 ── */
    .msg-list {
      flex: 1; overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    .msg-list::-webkit-scrollbar { width: 4px; }
    .msg-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    /* 欢迎卡片 */
    .welcome-card {
      background: var(--gradient-hero);
      border-radius: 20px; padding: 24px 20px;
      text-align: center; margin-bottom: 4px;
      animation: fadeIn .5s ease;
    }
    .welcome-emoji { font-size: 48px; margin-bottom: 10px; }
    .welcome-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .welcome-desc  { font-size: 13px; color: rgba(255,255,255,.7); line-height: 1.6; }
    .quick-asks {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 14px; justify-content: center;
    }
    .quick-ask {
      background: rgba(255,255,255,.12); color: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: var(--radius-full); padding: 6px 14px;
      font-size: 12px; cursor: pointer; transition: background .2s;
    }
    .quick-ask:hover { background: rgba(255,255,255,.22); }

    /* 消息气泡 */
    .msg-row {
      display: flex; gap: 10px; align-items: flex-end;
      animation: msgIn .3s ease; max-width: 100%;
    }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .msg-avatar.ai   { background: var(--gradient-primary); box-shadow: var(--shadow-primary); }
    .msg-avatar.user { background: var(--gradient-hero); }

    .msg-bubble {
      max-width: 72%; padding: 12px 16px;
      border-radius: 18px; font-size: 14px; line-height: 1.7;
      word-break: break-word; position: relative;
    }
    .msg-row.ai .msg-bubble {
      background: #fff; color: var(--color-text-primary);
      border-radius: 4px 18px 18px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .msg-row.user .msg-bubble {
      background: var(--gradient-primary); color: #fff;
      border-radius: 18px 4px 18px 18px;
      box-shadow: var(--shadow-primary);
    }

    /* Markdown */
    .msg-bubble p  { margin: 0 0 6px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 6px 0; }
    .msg-bubble li { margin-bottom: 3px; }
    .msg-bubble code {
      background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 4px;
      font-family: monospace; font-size: 13px;
    }
    .msg-row.user .msg-bubble code { background: rgba(255,255,255,.2); }
    .msg-bubble strong { font-weight: 700; }

    /* 打字指示 */
    .typing-indicator { display: flex; gap: 10px; align-items: flex-end; }
    .typing-dots {
      background: #fff; border-radius: 4px 18px 18px 18px;
      padding: 14px 18px; display: flex; gap: 5px; align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%; background: #ccc;
      animation: dotBounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dotBounce {
      0%,80%,100% { transform:scale(1); background:#ccc; }
      40%          { transform:scale(1.3); background:var(--color-primary); }
    }

    /* ── 输入区 ── */
    .input-bar {
      flex-shrink: 0;
      background: rgba(255,255,255,0.96); backdrop-filter: blur(16px);
      border-top: 1px solid var(--color-border-light);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
    }
    .input-inner {
      display: flex; gap: 10px; align-items: flex-end;
      max-width: 800px; margin: 0 auto;
    }
    #chat-input {
      flex: 1; min-height: 42px; max-height: 120px;
      padding: 10px 16px; border-radius: 21px;
      border: 1.5px solid var(--color-border);
      font-size: 15px; font-family: inherit; resize: none;
      line-height: 1.5; overflow-y: auto; background: var(--color-bg);
      transition: border-color .2s, box-shadow .2s;
    }
    #chat-input:focus {
      outline: none; border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(255,92,92,.1); background: #fff;
    }
    #btn-send {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: var(--gradient-primary); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; box-shadow: var(--shadow-primary); transition: all .2s;
    }
    #btn-send:hover:not(:disabled) {
      transform: scale(1.1); box-shadow: 0 4px 16px rgba(255,92,92,.45);
    }
    #btn-send:disabled { background: linear-gradient(135deg,#ddd,#ccc); box-shadow: none; cursor: not-allowed; }
    #btn-send.loading { animation: rotateSend .8s linear infinite; }
    @keyframes rotateSend { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<!-- 导航 -->
<nav class="nav-bar">
  <button class="nav-back" id="btn-back">←</button>
  <div class="nav-avatar">🤖</div>
  <div class="nav-info">
    <div class="nav-title">觅境 AI 客服</div>
    <div class="nav-status"><div class="status-dot"></div>在线</div>
  </div>
</nav>

<!-- 消息列表 -->
<div class="msg-list" id="msg-list">
  <div class="welcome-card">
    <div class="welcome-emoji">🤖</div>
    <div class="welcome-title">你好，我是觅境 AI</div>
    <div class="welcome-desc">我可以帮你推荐餐厅、解答优惠券问题、<br>查询商铺信息，随时为你服务！</div>
    <div class="quick-asks">
      <span class="quick-ask">附近有什么好吃的？</span>
      <span class="quick-ask">怎么使用优惠券？</span>
      <span class="quick-ask">秒杀券有哪些规则？</span>
      <span class="quick-ask">帮我推荐咖啡馆</span>
    </div>
  </div>
</div>

<!-- 输入区 -->
<div class="input-bar">
  <div class="input-inner">
    <textarea id="chat-input" placeholder="向 AI 提问…" rows="1"></textarea>
    <button id="btn-send" aria-label="发送">➤</button>
  </div>
</div>

<script type="module">
import { navigate, TokenManager, toast } from './js/utils.js';
import { AiAPI } from './js/api.js';

/* ── 状态 ── */
let isLoading = false;

/* ── DOM ── */
const msgList = document.getElementById('msg-list');
const input   = document.getElementById('chat-input');
const btnSend = document.getElementById('btn-send');

/* ── 初始化 ── */
function init() {
  if (!TokenManager.exists()) {
    appendMsg('ai', '👋 你好！请先 <a href="./login.html" style="color:var(--color-primary);font-weight:600">登录</a> 后再开始对话。');
  }
  document.querySelectorAll('.quick-ask').forEach(el => {
    el.addEventListener('click', () => { input.value = el.textContent; send(); });
  });
}

/* ── 返回 ── */
document.getElementById('btn-back').addEventListener('click', () =>
  history.length > 1 ? history.back() : navigate('/frontend/index.html'));

/* ── 输入框 ── */
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!isLoading) send(); }
});
btnSend.addEventListener('click', () => { if (!isLoading) send(); });

/* ── 发送 ── */
async function send() {
  const text = input.value.trim();
  if (!text || isLoading) return;

  if (!TokenManager.exists()) {
    toast.warning('请先登录后再对话');
    setTimeout(() => navigate('/frontend/login.html'), 800);
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  appendMsg('user', escapeHtml(text));
  scrollToBottom();

  const typingEl = appendTyping();
  isLoading = true; setSendLoading(true);

  try {
    const res = await AiAPI.chat(text);
    typingEl.remove();
    if (res?.success) {
      appendMsg('ai', renderMarkdown(res.data || ''));
    } else {
      appendMsg('ai', `⚠️ ${res?.errorMsg || '请求失败，请稍后重试'}`);
    }
  } catch {
    typingEl.remove();
    appendMsg('ai', '⚠️ 网络异常，请检查后端服务是否已启动');
  } finally {
    isLoading = false; setSendLoading(false); scrollToBottom();
  }
}

/* ── 渲染 ── */
function appendMsg(role, html) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  row.innerHTML = role === 'ai'
    ? `<div class="msg-avatar ai">🤖</div><div class="msg-bubble">${html}</div>`
    : `<div class="msg-avatar user">😊</div><div class="msg-bubble">${html}</div>`;
  msgList.appendChild(row);
  scrollToBottom();
  return row;
}

function appendTyping() {
  const row = document.createElement('div');
  row.className = 'typing-indicator';
  row.innerHTML = `<div class="msg-avatar ai">🤖</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  msgList.appendChild(row);
  scrollToBottom();
  return row;
}

function renderMarkdown(text) {
  return escapeHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
    .replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^(.+)$/, '<p>$1</p>');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollToBottom() {
  requestAnimationFrame(() => { msgList.scrollTop = msgList.scrollHeight; });
}

function setSendLoading(loading) {
  btnSend.disabled = loading;
  btnSend.textContent = loading ? '⟳' : '➤';
  loading ? btnSend.classList.add('loading') : btnSend.classList.remove('loading');
}

init();
</script>
</body>
</html>
